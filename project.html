<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Projet — Anthony Da Costa</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
:root{
  --bg:#070605; --ink:#f4eee3; --ink-dim:#948b7d; --ink-faint:#5a5247;
  --accent:#ffb347; --accent-2:#ff8a2b; --line:rgba(244,238,227,.10);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ min-height:100%; }
body{
  background:
    radial-gradient(110% 70% at 80% -10%, rgba(255,138,43,.10), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
body::after{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:60;
  background:radial-gradient(135% 130% at 50% 45%, transparent 55%, rgba(0,0,0,.55) 100%);
  mix-blend-mode:multiply;
}
.mono{ font-family:"IBM Plex Mono", ui-monospace, monospace; }

/* top */
.top{
  display:flex; align-items:center; justify-content:space-between;
  padding:24px clamp(20px,5vw,64px);
}
.back{
  display:inline-flex; align-items:center; gap:9px;
  color:var(--ink-dim); text-decoration:none; font-size:13px; font-weight:500;
  transition:color .25s var(--ease), gap .25s var(--ease);
}
.back:hover, .back:focus-visible{ color:var(--ink); gap:13px; outline:none; }
.back svg{ width:16px; height:16px; }
.brand{ font-family:"Helvetica Neue", Helvetica, Arial, sans-serif; font-weight:700; font-size:14px; color:var(--ink-dim); letter-spacing:-.01em; }

/* contenu */
.wrap{
  display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr);
  gap:clamp(32px,6vw,90px); align-items:center;
  max-width:1180px; margin:0 auto;
  padding:clamp(20px,5vh,60px) clamp(20px,5vw,64px) 80px;
}

/* visuel */
.visual{ display:flex; justify-content:center; }
.panel{
  position:relative; width:min(420px,80vw); aspect-ratio:232/322;
  border-radius:12px; overflow:hidden;
  background-image:var(--grad); background-size:cover; background-position:center;
  box-shadow:0 60px 100px -30px rgba(0,0,0,.9), 0 0 90px -10px var(--glow), 0 0 0 1px rgba(255,255,255,.08) inset;
}
.panel img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.panel::after{
  content:""; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(120deg, rgba(255,255,255,.14), transparent 40%, transparent 72%, rgba(0,0,0,.2));
}
.panel .num{ position:absolute; top:16px; left:18px; font-size:12px; letter-spacing:.12em; color:rgba(255,255,255,.6); text-shadow:0 1px 4px rgba(0,0,0,.5); }

/* texte */
.info .kicker{ font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--accent); margin-bottom:20px; }
.info h1{ font-size:clamp(40px,6vw,76px); font-weight:700; line-height:.95; letter-spacing:-.025em; }
.info .desc{ margin-top:26px; max-width:460px; color:var(--ink-dim); font-size:16px; line-height:1.65; }

.facts{ margin-top:38px; display:flex; gap:36px; flex-wrap:wrap; }
.fact .k{ font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:7px; }
.fact .v{ font-size:15px; color:var(--ink); }

.nav-proj{ margin-top:48px; display:flex; gap:14px; }
.nav-proj a{
  display:inline-flex; align-items:center; gap:8px;
  border:1px solid var(--line); border-radius:999px; padding:10px 18px;
  color:var(--ink-dim); text-decoration:none; font-size:13px;
  transition:border-color .25s var(--ease), color .25s var(--ease), background .25s var(--ease);
}
.nav-proj a:hover, .nav-proj a:focus-visible{ color:var(--ink); border-color:rgba(255,179,71,.4); background:rgba(255,179,71,.08); outline:none; }

@media (max-width:820px){
  .wrap{ grid-template-columns:1fr; text-align:center; }
  .info{ order:2; }
  .visual{ order:1; }
  .info .desc, .facts{ margin-left:auto; margin-right:auto; }
  .facts{ justify-content:center; }
}
@media (prefers-reduced-motion:reduce){ *{ transition-duration:.001ms !important; } }
</style>
</head>
<body>
  <header class="top">
    <a class="back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Tous les projets
    </a>
    <span class="brand">ANTHONY DA COSTA</span>
  </header>

  <main class="wrap" id="wrap"><!-- injecté --></main>

  <script src="projects.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    let idx = parseInt(params.get('p'), 10);
    if (isNaN(idx) || idx < 0 || idx >= PROJECTS.length) idx = 0;
    const p = PROJECTS[idx];
    document.title = `${p.title} — Anthony Da Costa`;

    const n = String(idx + 1).padStart(2, '0');
    const prev = (idx - 1 + PROJECTS.length) % PROJECTS.length;
    const next = (idx + 1) % PROJECTS.length;
    const imgStyle = `object-position:${p.pos || 'center'};transform:scale(${p.zoom || 1});`;
    const imgTag = p.img ? `<img src="${p.img}" alt="${p.title}" style="${imgStyle}" onerror="this.remove()">` : '';

    document.getElementById('wrap').innerHTML = `
      <section class="info">
        <div class="kicker mono">${p.cat}</div>
        <h1>${p.title}</h1>
        <p class="desc">${p.desc}</p>
        <div class="facts">
          <div class="fact"><div class="k">Année</div><div class="v mono">${p.year}</div></div>
          <div class="fact"><div class="k">Catégorie</div><div class="v">${p.cat}</div></div>
          <div class="fact"><div class="k">Auteur</div><div class="v">Anthony Da Costa</div></div>
        </div>
        <div class="nav-proj">
          <a href="project.html?p=${prev}">← ${PROJECTS[prev].title}</a>
          <a href="project.html?p=${next}">${PROJECTS[next].title} →</a>
        </div>
      </section>
      <section class="visual">
        <div class="panel" style="--grad:${p.grad}; --glow:${p.glow}">
          ${imgTag}
        </div>
      </section>`;
  </script>
</body>
</html>
